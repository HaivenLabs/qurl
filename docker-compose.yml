services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      QURL_LISTEN_ADDR: :8080
    ports:
      - "8080:8080"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        EXPO_PUBLIC_QURL_API_BASE_URL: http://localhost:8080
    depends_on:
      - backend
    ports:
      - "3000:80"
