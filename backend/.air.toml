root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/qurl-backend ./cmd/qurl-backend"
  bin = "./tmp/qurl-backend"
  include_ext = ["go", "svg"]
  include_dir = ["cmd", "internal"]
  exclude_dir = ["tmp"]
  delay = 500 # ms after file change before rebuilding
  stop_on_error = true
  send_interrupt = true
  kill_delay = 500

[log]
  time = false

[misc]
  clean_on_exit = true
